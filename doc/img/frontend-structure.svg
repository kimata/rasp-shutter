<svg width="960" height="560" viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12.5">
  <defs>
    <marker id="wa" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#57606a"/>
    </marker>
  </defs>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2328">フロントエンド構成（Vue 3 / Options API / vite ビルド → frontend/dist）</text>

  <!-- App.vue -->
  <rect x="330" y="52" width="300" height="40" rx="8" fill="#0969da"/>
  <text x="480" y="78" text-anchor="middle" fill="#fff" font-weight="bold">App.vue（main.js + ToastPlugin）</text>

  <!-- components -->
  <g font-size="11.5">
    <rect x="40" y="130" width="200" height="120" rx="8" fill="#eaf2fb" stroke="#0969da" stroke-width="1.5"/>
    <text x="140" y="152" text-anchor="middle" font-weight="bold">ManualControl / ManualEntry</text>
    <text x="52" y="174">GET /api/shutter_list</text>
    <text x="52" y="192">POST /api/shutter_ctrl（cmd=1）</text>
    <text x="52" y="212" fill="#57606a">postponed で warning トースト、</text>
    <text x="52" y="228" fill="#57606a">リクエスト中はボタン disable</text>

    <rect x="270" y="130" width="200" height="120" rx="8" fill="#eaf2fb" stroke="#0969da" stroke-width="1.5"/>
    <text x="370" y="152" text-anchor="middle" font-weight="bold">ScheduleSetting / ScheduleEntry</text>
    <text x="282" y="174">GET /api/schedule_ctrl</text>
    <text x="282" y="192">POST /api/schedule_ctrl（cmd=set）</text>
    <text x="282" y="212" fill="#57606a">SSE "schedule" 受信で再取得。</text>
    <text x="282" y="228" fill="#57606a">400 は「指定が不正」トースト</text>

    <rect x="500" y="130" width="200" height="120" rx="8" fill="#eaf2fb" stroke="#0969da" stroke-width="1.5"/>
    <text x="600" y="152" text-anchor="middle" font-weight="bold">SensorData</text>
    <text x="512" y="174">GET /api/sensor（10 秒ポーリング）</text>
    <text x="512" y="192" fill="#57606a">値変化は 16ms interval の</text>
    <text x="512" y="208" fill="#57606a">イージングでアニメーション。</text>
    <text x="512" y="224" fill="#57606a">unmounted で全タイマー解放</text>

    <rect x="730" y="130" width="200" height="120" rx="8" fill="#eaf2fb" stroke="#0969da" stroke-width="1.5"/>
    <text x="830" y="152" text-anchor="middle" font-weight="bold">AppLog</text>
    <text x="742" y="174">GET /api/log_view / log_clear</text>
    <text x="742" y="192" fill="#57606a">SSE "log" 受信で再取得。</text>
    <text x="742" y="208" fill="#57606a">メッセージは HTML エスケープ後に</text>
    <text x="742" y="224" fill="#57606a">装飾タグを挿入（v-html）</text>
  </g>

  <g stroke="#0969da" stroke-width="1.5">
    <line x1="400" y1="92" x2="140" y2="130"/>
    <line x1="450" y1="92" x2="370" y2="130"/>
    <line x1="510" y1="92" x2="600" y2="130"/>
    <line x1="560" y1="92" x2="830" y2="130"/>
  </g>

  <!-- event-stream -->
  <rect x="270" y="290" width="430" height="110" rx="10" fill="#eef7f0" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="485" y="314" text-anchor="middle" font-weight="bold" fill="#1a7f37">utils/event-stream.js（モジュールシングルトン）</text>
  <g font-size="11.5">
    <text x="286" y="338">・EventSource（/api/event）をアプリ全体で 1 本だけ張る</text>
    <text x="286" y="356">・subscribeEvent(url, type, callback) → 購読解除関数を返す</text>
    <text x="286" y="374">・切断時は 10 秒後に自動再接続。購読者ゼロで接続とタイマーを解放</text>
    <text x="286" y="392" fill="#57606a">・各コンポーネントは unmounted で必ず購読解除する</text>
  </g>
  <line x1="370" y1="250" x2="420" y2="290" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#wa)"/>
  <line x1="830" y1="250" x2="560" y2="290" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#wa)"/>

  <!-- shared -->
  <rect x="40" y="430" width="890 " height="100" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="56" y="454" font-weight="bold">共通事項</text>
  <g font-size="11.5">
    <text x="56" y="476">・HTTP は axios。読取は GET、状態変更は POST（バックエンドが GET の変更系を 405 で拒否）</text>
    <text x="56" y="494">・API ベースパスは mixins/AppConfig.js（/rasp-shutter/api/）。通知は vue-toast-notification</text>
    <text x="56" y="512">・開発時は vite dev サーバーの proxy が /rasp-shutter/api を Flask（localhost:5000）へ中継。本番は vite build 成果物を my_lib.webapp.base が配信</text>
  </g>
</svg>
