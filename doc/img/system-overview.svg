<svg width="960" height="600" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#57606a"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#1a7f37"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#d4610a"/>
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2328">rasp-shutter 全体構成</text>

  <!-- Browser -->
  <rect x="30" y="60" width="250" height="150" rx="10" fill="#eaf2fb" stroke="#0969da" stroke-width="1.5"/>
  <text x="155" y="84" text-anchor="middle" font-weight="bold" fill="#0969da">ブラウザ（Vue 3 SPA）</text>
  <g font-size="11.5" fill="#1f2328">
    <rect x="45" y="96" width="105" height="24" rx="4" fill="#fff" stroke="#0969da"/><text x="97" y="112" text-anchor="middle">ManualControl</text>
    <rect x="160" y="96" width="105" height="24" rx="4" fill="#fff" stroke="#0969da"/><text x="212" y="112" text-anchor="middle">ScheduleSetting</text>
    <rect x="45" y="128" width="105" height="24" rx="4" fill="#fff" stroke="#0969da"/><text x="97" y="144" text-anchor="middle">SensorData</text>
    <rect x="160" y="128" width="105" height="24" rx="4" fill="#fff" stroke="#0969da"/><text x="212" y="144" text-anchor="middle">AppLog</text>
    <text x="155" y="182" text-anchor="middle" fill="#57606a">REST（読取=GET / 変更=POST）+ SSE ×1本</text>
  </g>

  <!-- Flask process -->
  <rect x="340" y="60" width="330" height="330" rx="10" fill="#f3eefc" stroke="#6e40c9" stroke-width="1.5"/>
  <text x="505" y="84" text-anchor="middle" font-weight="bold" fill="#6e40c9">Flask プロセス（app.py, threaded）</text>
  <g font-size="11.5">
    <rect x="358" y="96" width="294" height="26" rx="4" fill="#fff" stroke="#6e40c9"/><text x="505" y="113" text-anchor="middle">control/webapi/*（制御・スケジュール・センサー）</text>
    <rect x="358" y="130" width="294" height="26" rx="4" fill="#fff" stroke="#6e40c9"/><text x="505" y="147" text-anchor="middle">metrics/webapi（ダッシュボード + JSON API）</text>
    <rect x="358" y="164" width="294" height="26" rx="4" fill="#fff" stroke="#6e40c9"/><text x="505" y="181" text-anchor="middle">my_lib.webapp（静的配信 / SSE / ログ / util）</text>
  </g>

  <!-- Scheduler thread inside flask -->
  <rect x="358" y="210" width="294" height="160" rx="8" fill="#e6f4ea" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="505" y="232" text-anchor="middle" font-weight="bold" fill="#1a7f37">スケジューラスレッド（schedule_worker）</text>
  <g font-size="11.5">
    <rect x="374" y="244" width="262" height="24" rx="4" fill="#fff" stroke="#1a7f37"/><text x="505" y="260" text-anchor="middle">時刻ジョブ: shutter_schedule_control</text>
    <rect x="374" y="276" width="262" height="24" rx="4" fill="#fff" stroke="#1a7f37"/><text x="505" y="292" text-anchor="middle">毎秒: shutter_auto_open / auto_close</text>
    <rect x="374" y="308" width="262" height="24" rx="4" fill="#fff" stroke="#1a7f37"/><text x="505" y="324" text-anchor="middle">毎秒: shutter_pending_close（失敗再試行）</text>
    <text x="505" y="356" text-anchor="middle" fill="#57606a">ループ間隔 0.5 秒（DUMMY_MODE は 0.1 秒）</text>
  </g>

  <!-- ESP32 -->
  <rect x="740" y="60" width="190" height="80" rx="10" fill="#fff1e5" stroke="#d4610a" stroke-width="1.5"/>
  <text x="835" y="88" text-anchor="middle" font-weight="bold" fill="#d4610a">ESP32 × N 台</text>
  <text x="835" y="108" text-anchor="middle" font-size="11.5">GET endpoint.open / .close</text>
  <text x="835" y="126" text-anchor="middle" font-size="11.5">（config.yaml の shutter[]）</text>

  <!-- InfluxDB -->
  <rect x="740" y="170" width="190" height="70" rx="10" fill="#e8f7f9" stroke="#0e7490" stroke-width="1.5"/>
  <text x="835" y="196" text-anchor="middle" font-weight="bold" fill="#0e7490">InfluxDB</text>
  <text x="835" y="216" text-anchor="middle" font-size="11.5">照度（lux）/ 日射（solar_rad）</text>

  <!-- Slack -->
  <rect x="740" y="270" width="190" height="60" rx="10" fill="#fdf3f8" stroke="#bf3989" stroke-width="1.5"/>
  <text x="835" y="296" text-anchor="middle" font-weight="bold" fill="#bf3989">Slack</text>
  <text x="835" y="316" text-anchor="middle" font-size="11.5">エラー通知（log.error 経由）</text>

  <!-- Local storage -->
  <rect x="340" y="430" width="330" height="140" rx="10" fill="#f0f3f6" stroke="#57606a" stroke-width="1.5"/>
  <text x="505" y="454" text-anchor="middle" font-weight="bold">ローカルストレージ</text>
  <g font-size="11.5">
    <rect x="358" y="466" width="140" height="40" rx="4" fill="#fff" stroke="#57606a"/>
    <text x="428" y="482" text-anchor="middle">schedule.dat</text><text x="428" y="498" text-anchor="middle" fill="#57606a">（pickle, serializer）</text>
    <rect x="512" y="466" width="140" height="40" rx="4" fill="#fff" stroke="#57606a"/>
    <text x="582" y="482" text-anchor="middle">footprint 状態ファイル</text><text x="582" y="498" text-anchor="middle" fill="#57606a">（stat_dir_path 配下）</text>
    <rect x="358" y="514" width="140" height="40" rx="4" fill="#fff" stroke="#57606a"/>
    <text x="428" y="530" text-anchor="middle">log.db</text><text x="428" y="546" text-anchor="middle" fill="#57606a">（実行ログ SQLite）</text>
    <rect x="512" y="514" width="140" height="40" rx="4" fill="#fff" stroke="#57606a"/>
    <text x="582" y="530" text-anchor="middle">metrics.db</text><text x="582" y="546" text-anchor="middle" fill="#57606a">（メトリクス SQLite）</text>
  </g>

  <!-- healthz -->
  <rect x="60" y="430" width="220" height="80" rx="10" fill="#fffbdd" stroke="#9a6700" stroke-width="1.5"/>
  <text x="170" y="456" text-anchor="middle" font-weight="bold" fill="#9a6700">healthz.py（K8s livenessProbe）</text>
  <text x="170" y="478" text-anchor="middle" font-size="11.5">liveness.file.scheduler の鮮度と</text>
  <text x="170" y="496" text-anchor="middle" font-size="11.5">HTTP ポートを確認</text>

  <!-- arrows -->
  <line x1="280" y1="120" x2="340" y2="120" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="180" x2="280" y2="160" stroke="#57606a" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="288" y="178" font-size="10.5" fill="#57606a">SSE</text>
  <line x1="670" y1="110" x2="740" y2="100" stroke="#d4610a" stroke-width="2" marker-end="url(#arrowO)"/>
  <text x="676" y="96" font-size="10.5" fill="#d4610a">開閉指示</text>
  <line x1="670" y1="200" x2="740" y2="200" stroke="#0e7490" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="678" y="192" font-size="10.5" fill="#0e7490">センサー値</text>
  <line x1="670" y1="290" x2="740" y2="298" stroke="#bf3989" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="505" y1="390" x2="505" y2="430" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="486" x2="340" y2="486" stroke="#9a6700" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
</svg>
