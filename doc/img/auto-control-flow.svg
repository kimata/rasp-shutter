<svg width="1060" height="728" viewBox="0 0 1060 728" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12">
  <defs>
    <marker id="fa" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#57606a"/>
    </marker>
  </defs>
  <text x="530" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2328">自動制御の判定フロー（shutter_auto_control、毎秒実行）</text>

  <!-- entry -->
  <rect x="442" y="44" width="200" height="36" rx="18" fill="#34435a"/>
  <text x="542" y="67" text-anchor="middle" fill="#fff" font-weight="bold">shutter_auto_control()</text>
  <line x1="472" y1="80" x2="190" y2="106" stroke="#57606a" stroke-width="1.5" marker-end="url(#fa)"/>
  <line x1="542" y1="80" x2="542" y2="106" stroke="#57606a" stroke-width="1.5" marker-end="url(#fa)"/>
  <line x1="612" y1="80" x2="882" y2="106" stroke="#57606a" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- auto open column -->
  <rect x="20" y="106" width="340" height="428" rx="10" fill="#fffbee" stroke="#9a6700" stroke-width="1.5"/>
  <text x="190" y="130" text-anchor="middle" font-weight="bold" fill="#9a6700">shutter_auto_open（5 &lt; hour &lt; 12）</text>
  <g font-size="11.5">
    <rect x="36" y="142" width="308" height="30" rx="5" fill="#fff" stroke="#9a6700"/>
    <text x="46" y="161">open スケジュールが有効か（is_active）</text>
    <rect x="36" y="180" width="308" height="44" rx="5" fill="#fff" stroke="#9a6700"/>
    <text x="46" y="198">STAT_PENDING_OPEN があるか</text>
    <text x="46" y="214" fill="#57606a">（経過 6 時間以内。なければ何もしない）</text>
    <rect x="36" y="232" width="308" height="30" rx="5" fill="#fff" stroke="#9a6700"/>
    <text x="46" y="251">自動クローズ直後（2 分以内）でないか</text>
    <rect x="36" y="270" width="308" height="30" rx="5" fill="#fff" stroke="#9a6700"/>
    <text x="46" y="289">失敗リトライ抑制中（2 分以内）でないか</text>
    <rect x="36" y="308" width="308" height="58" rx="5" fill="#ddf4e4" stroke="#1a7f37"/>
    <text x="46" y="326" font-weight="bold">明るさ判定（check_brightness "open"）</text>
    <text x="46" y="342">lux &gt; 閾値 AND solar_rad &gt; 閾値</text>
    <text x="46" y="357">AND altitude &gt; 閾値（すべて AND）</text>
    <rect x="36" y="374" width="308" height="44" rx="5" fill="#fff" stroke="#9a6700"/>
    <text x="46" y="392">BRIGHT → exec_shutter_control("open")</text>
    <text x="46" y="408" fill="#57606a">（最大 3 回即時リトライ）</text>
    <rect x="36" y="426" width="308" height="52" rx="5" fill="#e6f4ea" stroke="#1a7f37"/>
    <text x="46" y="444" font-weight="bold" fill="#1a7f37">成功時のみ:</text>
    <text x="46" y="460">PENDING_OPEN と AUTO_CLOSE をクリア</text>
    <rect x="36" y="486" width="308" height="36" rx="5" fill="#fde8e8" stroke="#cf222e"/>
    <text x="46" y="503" fill="#cf222e">失敗時: 失敗時刻を記録（2 分後に再試行）</text>
    <text x="46" y="517" fill="#cf222e" font-size="10.5">DARK 時: 見合わせメトリクスを記録</text>
  </g>

  <!-- auto close column -->
  <rect x="372" y="106" width="340" height="508" rx="10" fill="#eef4fb" stroke="#0969da" stroke-width="1.5"/>
  <text x="542" y="130" text-anchor="middle" font-weight="bold" fill="#0969da">shutter_auto_close（5 &lt; hour &lt; 20）</text>
  <g font-size="11.5">
    <rect x="388" y="142" width="308" height="30" rx="5" fill="#fff" stroke="#0969da"/>
    <text x="398" y="161">close スケジュールが有効か（is_active）</text>
    <rect x="388" y="180" width="308" height="30" rx="5" fill="#fff" stroke="#0969da"/>
    <text x="398" y="199">開け時刻の ±1 分以内でないか</text>
    <rect x="388" y="218" width="308" height="44" rx="5" fill="#fff" stroke="#0969da"/>
    <text x="398" y="236">開け時刻より後か・PENDING_OPEN が</text>
    <text x="398" y="252">存在しないか</text>
    <rect x="388" y="270" width="308" height="30" rx="5" fill="#fff" stroke="#0969da"/>
    <text x="398" y="289">閉め時刻より前か</text>
    <rect x="388" y="308" width="308" height="30" rx="5" fill="#fff" stroke="#0969da"/>
    <text x="398" y="327">12 時間以内に自動クローズしていないか</text>
    <rect x="388" y="346" width="308" height="30" rx="5" fill="#fff" stroke="#0969da"/>
    <text x="398" y="365">失敗リトライ抑制中（2 分以内）でないか</text>
    <rect x="388" y="384" width="308" height="30" rx="5" fill="#fff" stroke="#0969da"/>
    <text x="398" y="403">2 分以内に開けたシャッターがないか</text>
    <rect x="388" y="422" width="308" height="44" rx="5" fill="#ddf4e4" stroke="#1a7f37"/>
    <text x="398" y="440" font-weight="bold">暗さ判定（check_brightness "close"）</text>
    <text x="398" y="456">lux / solar_rad / altitude いずれか &lt; 閾値（OR）</text>
    <rect x="388" y="474" width="308" height="66" rx="5" fill="#e6f4ea" stroke="#1a7f37"/>
    <text x="398" y="492" font-weight="bold" fill="#1a7f37">DARK → exec 成功時のみ:</text>
    <text x="398" y="508">STAT_AUTO_CLOSE を更新。5 &lt; hour &lt; 13 なら</text>
    <text x="398" y="524">PENDING_OPEN を設定（再び明るくなったら開ける）</text>
    <rect x="388" y="548" width="308" height="30" rx="5" fill="#fde8e8" stroke="#cf222e"/>
    <text x="398" y="567" fill="#cf222e">失敗時: 失敗時刻を記録（2 分後に再試行）</text>
  </g>

  <!-- pending close column -->
  <rect x="724" y="106" width="316" height="428" rx="10" fill="#fdf0f4" stroke="#bf3989" stroke-width="1.5"/>
  <text x="882" y="130" text-anchor="middle" font-weight="bold" fill="#bf3989">shutter_pending_close（時間帯によらず）</text>
  <g font-size="11.5">
    <rect x="740" y="142" width="284" height="44" rx="5" fill="#fff" stroke="#bf3989"/>
    <text x="750" y="160">STAT_PENDING_CLOSE があるか</text>
    <text x="750" y="176" fill="#57606a">（スケジュール閉め失敗時に設定）</text>
    <rect x="740" y="194" width="284" height="58" rx="5" fill="#fde8e8" stroke="#cf222e"/>
    <text x="750" y="212" font-weight="bold" fill="#cf222e">6 時間超過 → 諦め</text>
    <text x="750" y="228">footprint をクリアし Slack へ</text>
    <text x="750" y="244">エラー通知（1 回だけ）</text>
    <rect x="740" y="260" width="284" height="30" rx="5" fill="#fff" stroke="#bf3989"/>
    <text x="750" y="279">失敗リトライ抑制中でないか</text>
    <rect x="740" y="298" width="284" height="58" rx="5" fill="#fff" stroke="#bf3989"/>
    <text x="750" y="316">exec_shutter_control("close")</text>
    <text x="750" y="332" fill="#57606a">（SCHEDULE モードで再試行。</text>
    <text x="750" y="347" fill="#57606a">成功シャッターは間隔チェックで見合わせ）</text>
    <rect x="740" y="364" width="284" height="36" rx="5" fill="#e6f4ea" stroke="#1a7f37"/>
    <text x="750" y="386" fill="#1a7f37">成功: PENDING_CLOSE をクリア</text>
  </g>

  <!-- footer note -->
  <rect x="20" y="636" width="1020" height="78" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="36" y="660" font-weight="bold">失敗リトライ抑制（_last_auto_control_failure）</text>
  <text x="36" y="680" font-size="11.5">制御失敗の直後に毎ループ（毎秒）再試行してログ・通信がスパムになるのを防ぐため、</text>
  <text x="36" y="698" font-size="11.5">失敗から AUTO_CONTROL_RETRY_INTERVAL_SEC（2 分）はアクション別（open / close）に再試行を抑制する。</text>
</svg>
